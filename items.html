<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Item Tracker</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    position: relative;
    min-height: 100vh;
    background: linear-gradient(135deg, #dbeafe, #fdf6e3);
}

body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('pic1.jpeg') no-repeat center center/cover;
    filter: blur(3px);
    opacity: 0.8;
    z-index: -1;
}

.header {
    text-align: center;
    color: #0b2c4d;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.search-box {
    text-align: center;
    margin: 20px;
}

.search-box input {
    padding: 12px;
    width: 260px;
    border-radius: 25px;
    border: none;
    outline: none;
}

.search-box button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: #4a6fa5;
    color: white;
    cursor: pointer;
    margin-left: 10px;
    font-weight: bold;
}

.search-box button:hover { background: #3b5c8a; }

/* Filter buttons */
.filter-bar {
    text-align: center;
    margin: 10px 0 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.filter-bar button {
    padding: 8px 18px;
    border-radius: 20px;
    border: 2px solid #4a6fa5;
    background: transparent;
    color: #0b2c4d;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.filter-bar button.active,
.filter-bar button:hover {
    background: #4a6fa5;
    color: white;
}

#itemsContainer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    width: 240px;
    margin: 15px;
    padding: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
    color: #0b2c4d;
}

.card:hover { transform: translateY(-8px) scale(1.05); }

.card img {
    width: 100%;
    height: 140px;
    border-radius: 15px;
    object-fit: cover;
}

.card h3 { margin: 10px 0 5px; }
.card p  { margin: 5px 0; font-size: 14px; }

.badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
    margin-top: 6px;
}
.badge-lost  { background: #fde8e8; color: #c0392b; }
.badge-found { background: #e8fde8; color: #27ae60; }

.no-result {
    text-align: center;
    color: #0b2c4d;
    font-size: 18px;
    width: 100%;
}

.loading-msg {
    text-align: center;
    color: #4a6fa5;
    font-size: 18px;
    padding: 40px;
    width: 100%;
}

.footer {
    text-align: center;
    color: #0b2c4d;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>
<body>

<nav>
  <h2 class="logo">VIT Lost & Found</h2>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="lost.html">Report Lost</a></li>
    <li><a href="found.html">Report Found</a></li>
    <li><a href="items.html">Browse Items</a></li>
  </ul>
</nav>

<div class="header">🔎 Smart Item Tracker</div>

<div class="search-box">
  <input type="text" id="searchBox" placeholder="🔍 Search by name or category…">
  <button onclick="applyFilters()">🔍 Search</button>
  <button onclick="resetSearch()">🔄 Show All</button>
</div>

<div class="filter-bar">
  <button class="active" onclick="setTypeFilter('all',  this)">All</button>
  <button             onclick="setTypeFilter('lost', this)">Lost</button>
  <button             onclick="setTypeFilter('found',this)">Found</button>
</div>

<div id="itemsContainer">
  <p class="loading-msg">⏳ Loading items…</p>
</div>

<div class="footer">💡 Helping you reconnect with your belongings</div>

<!-- Firebase + items script -->
<script type="module">
  import { db } from "./firebase-config.js";
  import {
    collection,
    getDocs,
    orderBy,
    query
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let allItems = [];
  let currentTypeFilter = "all";

  // ── Fetch all items from Firestore ─────────────────────
  async function loadItems() {
    try {
      const q    = query(collection(db, "items"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      allItems   = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      displayItems(allItems);
    } catch (err) {
      console.error("Error loading items:", err);
      document.getElementById("itemsContainer").innerHTML =
        "<p class='no-result'>❌ Failed to load items. Check console.</p>";
    }
  }

  // ── Display helper ─────────────────────────────────────
  function displayItems(data) {
    const container = document.getElementById("itemsContainer");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p class='no-result'>😔 No items found</p>";
      return;
    }

    data.forEach(item => {
      const badgeClass = item.type === "lost" ? "badge-lost" : "badge-found";
      const badgeLabel = item.type === "lost" ? "🔴 Lost" : "🟢 Found";
      const imgSrc     = item.image
        ? item.image
        : "https://via.placeholder.com/200x140?text=No+Image";

      container.innerHTML += `
        <div class="card">
          <img src="${imgSrc}" alt="${item.name || 'Item'}">
          <h3>📌 ${item.name || 'No Name'}</h3>
          <p>📂 <b>Category:</b> ${item.category || 'N/A'}</p>
          <p>📍 <b>Location:</b> ${item.location || 'N/A'}</p>
          <p>📅 <b>Date:</b> ${item.date || 'N/A'}</p>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
        </div>`;
    });
  }

  // ── Filter logic ───────────────────────────────────────
  function applyFilters() {
    const query = document.getElementById("searchBox").value.toLowerCase().trim();

    let filtered = allItems;

    if (currentTypeFilter !== "all") {
      filtered = filtered.filter(i => i.type === currentTypeFilter);
    }

    if (query) {
      filtered = filtered.filter(i =>
        (i.name     && i.name.toLowerCase().includes(query)) ||
        (i.category && i.category.toLowerCase().includes(query))
      );
    }

    displayItems(filtered);
  }

  function resetSearch() {
    document.getElementById("searchBox").value = "";
    currentTypeFilter = "all";
    document.querySelectorAll(".filter-bar button").forEach((b, i) => {
      b.classList.toggle("active", i === 0);
    });
    displayItems(allItems);
  }

  function setTypeFilter(type, btn) {
    currentTypeFilter = type;
    document.querySelectorAll(".filter-bar button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  }

  // Expose to global scope for onclick handlers
  window.applyFilters  = applyFilters;
  window.resetSearch   = resetSearch;
  window.setTypeFilter = setTypeFilter;

  loadItems();
</script>

</body>
</html>
